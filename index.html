<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #eee; font-family: sans-serif; }

    #top-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      height: 48px;
      background: #111;
      border-bottom: 1px solid #333;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }

    #top-bar h1 {
      font-size: 14px;
      font-weight: 600;
      color: #aaa;
      white-space: nowrap;
    }

    #graph-select, #layout-select {
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }

    #graph-select { min-width: 200px; }
    #layout-select { min-width: 130px; }

    #meta {
      display: flex;
      gap: 8px;
      font-size: 12px;
      color: #aaa;
    }

    .meta-pill {
      background: #222;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2px 10px;
    }

    #3d-graph {
      position: fixed;
      top: 48px; left: 0; right: 0; bottom: 0;
    }

    #info-panel {
      position: fixed;
      top: 64px;
      right: 16px;
      width: 240px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.7;
      pointer-events: none;
      z-index: 50;
    }

    #info-panel .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #eee;
      margin-bottom: 8px;
      word-break: break-word;
    }

    #info-panel .panel-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    #info-panel .panel-row .label { color: #888; }

    #info-panel .panel-delta {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #333;
      color: #aaa;
    }

    #info-panel .hint { color: #555; font-style: italic; }
  </style>

  <script src="src/three.min.js"></script>
  <script src="src/three-spritetext.min.js"></script>
  <script src="src/3d-force-graph.min.js"></script>
  <script src="src/d3v5/d3.min.js"></script>
</head>

<body>

  <nav id="top-bar">
    <h1>GSF Account Network</h1>
    <select id="graph-select"><option disabled selected>Loading...</option></select>
    <h1>Graph Layout</h1>
    <select id="layout-select">
      <option value="null">Free</option>
      <option value="td">Top-Down</option>
      <option value="bu">Bottom-Up</option>
      <option value="lr">Left-Right</option>
      <option value="radialout">Radial</option>
    </select>
    <h1>Node Label</h1>
    <select id="label-select">
      <option value="none">None</option>
      <option value="mv" selected>Market Value</option>
    </select>
    <div id="meta">
      <span class="meta-pill" id="meta-type">—</span>
      <span class="meta-pill" id="meta-status">—</span>
    </div>
  </nav>
  <div id="3d-graph"></div>

  <div id="info-panel">
    <div class="hint">Hover a node to explore</div>
  </div>

  <script>
    let graphList = [];

    async function loadGraphList() {
      const res = await fetch('/api/graphs');
      graphList = await res.json();

      const sel = document.getElementById('graph-select');
      sel.innerHTML = '';
      graphList.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = g.name;
        sel.appendChild(opt);
      });

      if (graphList.length > 0) selectGraph(graphList[0]);
    }

    function selectGraph(g) {
      document.getElementById('meta-type').textContent = g.graph_type;
      document.getElementById('meta-status').textContent = g.status;
      if (Graph) Graph.jsonUrl(`/api/graphs/${g.id}`);
    }

    document.getElementById('graph-select').addEventListener('change', e => {
      const g = graphList.find(x => x.id == e.target.value);
      if (g) selectGraph(g);
    });

    document.getElementById('layout-select').addEventListener('change', e => {
      const mode = e.target.value === 'null' ? null : e.target.value;
      Graph.dagMode(mode).dagLevelDistance(65);
    });

    let labelMode = 'mv';

    const NODE_COLORS = {
      1: '#FFD700',  // Gold     — Canonical account
      2: '#4A90D9',  // Blue     — Topaz
      3: '#2ECC71',  // Green    — Emerald
      4: '#E74C3C',  // Red      — Ruby
      5: '#85BAE8',  // Lt. Blue — Topaz sub-account
      6: '#82E0AA',  // Lt. Green — Emerald sub-account
      7: '#F1948A',  // Lt. Red  — Ruby sub-account
    };

    function nodeDisplayLabel(node, mode) {
      if (node.group === 1) {
        // Canonical hub: always show account ID
        return node.id.split(':')[0].trim();
      }
      if (mode === 'none') return '';
      // Source spoke: source code on line 1, selected metric on line 2
      const sourceCode = node.id.split(': ')[1] ?? node.id;
      if (mode === 'mv' && node.metadata?.mv !== undefined) {
        return sourceCode + '\n$' + (node.metadata.mv / 1e6).toFixed(2) + 'M';
      }
      return sourceCode;
    }

    function nodeThreeObjectFn(node) {
      const text = nodeDisplayLabel(node, labelMode);
      if (!text) return false;
      const sprite = new SpriteText(text);
      sprite.color = '#fff';
      sprite.textHeight = node.group === 1 ? 2.5 : 3.5;
      sprite.backgroundColor = 'rgba(0,0,0,0.5)';
      sprite.padding = 1.5;
      sprite.position.set(0, 8, 0);
      return sprite;
    }

    document.getElementById('label-select').addEventListener('change', e => {
      labelMode = e.target.value;
      Graph.nodeThreeObject(nodeThreeObjectFn);
    });

    const elem = document.getElementById('3d-graph');

    const Graph = ForceGraph3D()
      (elem)
      .onDagError(() => false)
      .nodeThreeObjectExtend(true)
      .nodeThreeObject(nodeThreeObjectFn)
      .nodeOpacity(0.8)
      .linkLabel('purpose')
      .linkOpacity(0.8)
      .nodeResolution(8)
      .linkCurvature('curvature')
      .linkCurveRotation('rotation')
      .linkColor(link => {
        switch (link.status) {
          case 'Active':     return 'green';
          case 'Closed':
          case 'Terminated': return 'red';
          default:           return 'white';
        }
      })
      .onLinkHover(link => elem.style.cursor = link ? 'pointer' : null)
      .nodeColor(node => NODE_COLORS[node.group] ?? '#fff')
      .onNodeHover(node => {
        elem.style.cursor = node ? 'pointer' : null;
        if (!node) return;
        const panel = document.getElementById('info-panel');
        const m = node.metadata;
        const fmt = v => '$' + (v / 1e6).toFixed(2) + 'M';

        if (m && m.topaz_mv !== undefined && m.emerald_mv !== undefined) {
          // Canonical hub — show all three MVs and delta
          const deltaSign = m.mv_delta >= 0 ? '+' : '';
          panel.innerHTML = `
            <div class="panel-title">${node.id}</div>
            <div class="panel-row"><span class="label">Topaz MV</span><span>${fmt(m.topaz_mv)}</span></div>
            <div class="panel-row"><span class="label">Emerald MV</span><span>${fmt(m.emerald_mv)}</span></div>
            <div class="panel-row"><span class="label">Ruby MV</span><span>${fmt(m.ruby_mv)}</span></div>
            <div class="panel-delta panel-row"><span class="label">Δ Emerald – Topaz</span><span>${deltaSign}${fmt(m.mv_delta)}</span></div>`;
        } else if (m && m.mv !== undefined) {
          // Source spoke — show system name, source ID, and its own MV
          panel.innerHTML = `
            <div class="panel-title">${node.id}</div>
            <div class="panel-row"><span class="label">System</span><span>${m.system}</span></div>
            <div class="panel-row"><span class="label">Market Value</span><span>${fmt(m.mv)}</span></div>`;
        } else {
          panel.innerHTML = `<div class="panel-title">${node.id}</div>`;
        }
      })
      .onNodeDragEnd(node => {
        node.fx = node.x;
        node.fy = node.y;
        node.fz = node.z;
      })
      .onNodeClick(node => {
        const distance = 200;
        const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
        Graph.cameraPosition(
          { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
          node,
          3000
        );
      });

    loadGraphList();
  </script>
</body>
