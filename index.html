<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #eee; font-family: sans-serif; }

    #top-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 16px;
      padding: 8px 16px;
      min-height: 48px;
      background: #111;
      border-bottom: 1px solid #333;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }

    #top-bar h1 {
      font-size: 14px;
      font-weight: 600;
      color: #aaa;
      white-space: nowrap;
    }

    /* App title stretches to push controls right on wide screens */
    #top-bar h1:first-child {
      flex: 1 1 auto;
    }

    #graph-select, #layout-select, #type-filter, #label-select {
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }

    #type-filter  { min-width: 150px; }
    #graph-select { min-width: 200px; }
    #layout-select { min-width: 130px; }

    #legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(17,17,17,0.85);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 11px;
      color: #aaa;
      line-height: 1.9;
      z-index: 50;
      pointer-events: none;
    }

    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    #meta {
      display: flex;
      gap: 8px;
      font-size: 12px;
      color: #aaa;
    }

    .meta-pill {
      background: #222;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2px 10px;
    }

    #3d-graph {
      position: fixed;
      top: 48px; left: 0; right: 0; bottom: 0;
      /* Prevent browser from hijacking touch gestures so
         Three.js OrbitControls can handle them natively */
      touch-action: none;
    }

    #info-panel {
      position: fixed;
      top: 64px;
      right: 16px;
      width: 240px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.7;
      pointer-events: none;
      z-index: 50;
    }

    /* ── Mobile layout (≤ 600px) ─────────────────────────────── */
    @media (max-width: 600px) {
      #top-bar {
        gap: 6px 10px;
        padding: 6px 10px;
      }

      /* Hide secondary labels to save row space */
      #top-bar h1:not(:first-child) { display: none; }

      #type-filter, #graph-select, #layout-select, #label-select {
        min-width: 0;
        flex: 1 1 calc(50% - 10px);
        font-size: 12px;
      }

      #meta { font-size: 11px; }

      #info-panel {
        /* Move to bottom of screen so it doesn't obscure the graph centre */
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        max-height: 38vh;
        border-radius: 6px 6px 0 0;
      }

      #legend { display: none; }
    }

    #info-panel .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #eee;
      margin-bottom: 8px;
      word-break: break-word;
    }

    #info-panel .panel-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    #info-panel .panel-row .label { color: #888; }

    #info-panel .panel-delta {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #333;
      color: #aaa;
    }

    #info-panel .hint { color: #555; font-style: italic; }
  </style>

  <script src="//unpkg.com/three@0.136.0/build/three.min.js"></script>
  <script src="//unpkg.com/three-spritetext@1.10.0/dist/three-spritetext.min.js"></script>
  <script src="//unpkg.com/3d-force-graph@1.79.1/dist/3d-force-graph.min.js"></script>
  <script src="//unpkg.com/d3@5/dist/d3.min.js"></script>
</head>

<body>

  <nav id="top-bar">
    <h1>GSF Account Network</h1>
    <select id="type-filter">
      <option value="all">All Graphs</option>
      <option value="GSF Multi-Source Identity">Account Graphs</option>
      <option value="GSF Client Hierarchy">Client Hierarchy</option>
    </select>
    <select id="graph-select"><option value="" disabled selected>— Select a graph —</option></select>
    <h1>Graph Layout</h1>
    <select id="layout-select">
      <option value="null">Free</option>
      <option value="td">Top-Down</option>
      <option value="bu">Bottom-Up</option>
      <option value="lr">Left-Right</option>
      <option value="radialout">Radial</option>
    </select>
    <h1>Node Label</h1>
    <select id="label-select">
      <option value="none">None</option>
      <option value="mv" selected>Market Value</option>
      <option value="cost_basis">Cost Basis</option>
      <option value="unrealized_gl">Unrealized G/L</option>
    </select>
    <div id="meta">
      <span class="meta-pill" id="meta-type">—</span>
      <span class="meta-pill" id="meta-status">—</span>
    </div>
  </nav>
  <div id="3d-graph"></div>

  <div id="info-panel">
    <div class="hint">Select an account from the dropdown above</div>
  </div>

  <div id="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#CC8800"></span> Canonical Account</div>
    <div class="legend-item"><span class="legend-dot" style="background:#1565C0"></span> Topaz Record</div>
    <div class="legend-item"><span class="legend-dot" style="background:#1B5E20"></span> Emerald Record</div>
    <div class="legend-item"><span class="legend-dot" style="background:#B71C1C"></span> Ruby Record</div>
    <div class="legend-item"><span class="legend-dot" style="background:#6A0DAD"></span> Client / Household</div>
  </div>

  <script>
    let graphList = [];

    function populateGraphSelect(typeFilter) {
      const sel = document.getElementById('graph-select');
      sel.innerHTML = '<option value="" disabled selected>— Select a graph —</option>';
      const visible = typeFilter === 'all'
        ? graphList
        : graphList.filter(g => g.graph_type === typeFilter);
      visible.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = g.name;
        sel.appendChild(opt);
      });
    }

    async function loadGraphList() {
      const res = await fetch('/api/graphs');
      graphList = await res.json();
      populateGraphSelect(document.getElementById('type-filter').value);
    }

    document.getElementById('type-filter').addEventListener('change', e => {
      populateGraphSelect(e.target.value);
    });

    function selectGraph(g) {
      document.getElementById('meta-type').textContent = g.graph_type;
      document.getElementById('meta-status').textContent = g.status;
      document.getElementById('info-panel').innerHTML = '<div class="hint">Hover a node to explore</div>';
      if (Graph) Graph.jsonUrl(`/api/graphs/${g.id}`);
    }

    document.getElementById('graph-select').addEventListener('change', e => {
      const g = graphList.find(x => x.id == e.target.value);
      if (g) selectGraph(g);
    });

    document.getElementById('layout-select').addEventListener('change', e => {
      const mode = e.target.value === 'null' ? null : e.target.value;
      Graph.dagMode(mode).dagLevelDistance(65);
    });

    let labelMode = 'mv';

    const NODE_COLORS = {
      1: '#CC8800',  // Dark Gold   — Canonical account
      2: '#1565C0',  // Deep Blue   — Topaz
      3: '#1B5E20',  // Deep Green  — Emerald
      4: '#B71C1C',  // Deep Red    — Ruby
      5: '#1976D2',  // Med. Blue   — Topaz sub-account
      6: '#2E7D32',  // Med. Green  — Emerald sub-account
      7: '#C62828',  // Med. Red    — Ruby sub-account
      8: '#6A0DAD',  // Purple      — Client/Household
    };

    function nodeDisplayLabel(node, mode) {
      if (node.group === 8) {
        // Client/Household hub: show client ID
        return node.id.split(':')[0].trim();
      }
      if (node.group === 1) {
        // Canonical hub: always show account ID
        return node.id.split(':')[0].trim();
      }
      // Source spoke: source code always on line 1, selected metric on line 2
      const sourceCode = node.id.split(': ')[1] ?? node.id;
      const m = node.metadata;
      if (mode === 'mv' && m?.mv !== undefined) {
        return sourceCode + '\n$' + (m.mv / 1e6).toFixed(2) + 'M';
      }
      if (mode === 'cost_basis' && m?.cost_basis !== undefined) {
        return sourceCode + '\n$' + (m.cost_basis / 1e6).toFixed(2) + 'M CB';
      }
      if (mode === 'unrealized_gl' && m !== undefined) {
        return m.unrealized_gl !== null
          ? sourceCode + '\n$' + (m.unrealized_gl / 1e6).toFixed(2) + 'M GL'
          : sourceCode + '\nN/A';
      }
      return sourceCode;
    }

    function nodeThreeObjectFn(node) {
      const text = nodeDisplayLabel(node, labelMode);
      if (!text) return false;
      const sprite = new SpriteText(text);
      sprite.color = '#fff';
      sprite.textHeight = (node.group === 1 || node.group === 8) ? 2.5 : 3.5;
      sprite.backgroundColor = 'rgba(0,0,0,0.5)';
      sprite.padding = 1.5;
      sprite.position.set(0, 8, 0);
      return sprite;
    }

    document.getElementById('label-select').addEventListener('change', e => {
      labelMode = e.target.value;
      Graph.nodeThreeObject(nodeThreeObjectFn);
    });

    const elem = document.getElementById('3d-graph');

    // Keep the canvas sized to the space below the top bar.
    // The bar can grow taller on mobile when controls wrap to two rows,
    // so we measure its actual rendered height on every resize.
    function resizeGraph() {
      const barHeight = document.getElementById('top-bar').offsetHeight;
      elem.style.top = barHeight + 'px';
      if (Graph) {
        Graph.width(elem.offsetWidth).height(elem.offsetHeight);
      }
    }
    window.addEventListener('resize', resizeGraph);
    // Run once at startup after the bar has rendered
    requestAnimationFrame(resizeGraph);

    const Graph = ForceGraph3D()
      (elem)
      .onDagError(() => false)
      .nodeThreeObjectExtend(true)
      .nodeThreeObject(nodeThreeObjectFn)
      .nodeOpacity(0.8)
      .linkLabel('purpose')
      .linkOpacity(0.8)
      .nodeResolution(8)
      .linkCurvature('curvature')
      .linkCurveRotation('rotation')
      .linkColor(link => {
        switch (link.status) {
          case 'Active':     return 'green';
          case 'Closed':
          case 'Terminated': return 'red';
          default:           return 'white';
        }
      })
      .onLinkHover(link => elem.style.cursor = link ? 'pointer' : null)
      .nodeColor(node => NODE_COLORS[node.group] ?? '#fff')
      .onNodeHover(node => {
        elem.style.cursor = node ? 'pointer' : null;
        if (!node) return;
        const panel = document.getElementById('info-panel');
        const m = node.metadata;
        const fmt = v => '$' + (v / 1e6).toFixed(2) + 'M';

        const recordCounts = (tc, ec, rc) =>
          `<div class="panel-row"><span class="label">Records</span><span>T:${tc} pos · E:${ec} lots · R:${rc} pos</span></div>`;

        const deltaSpan = (delta) => {
          const abs = Math.abs(delta);
          const color = abs > 1e6 ? '#ff4444' : abs > 1e5 ? '#ff9900' : null;
          const sign = delta >= 0 ? '+' : '';
          return color
            ? `<span style="color:${color}">${sign}${fmt(delta)}</span>`
            : `<span>${sign}${fmt(delta)}</span>`;
        };

        if (m && m.total_topaz_mv !== undefined) {
          // Client/Household hub — rolled-up MVs across all accounts
          panel.innerHTML = `
            <div class="panel-title">${node.id}</div>
            <div class="panel-row"><span class="label">Accounts</span><span>${m.account_count}</span></div>
            <div class="panel-row"><span class="label">Topaz Total</span><span>${fmt(m.total_topaz_mv)}</span></div>
            <div class="panel-row"><span class="label">Emerald Total</span><span>${fmt(m.total_emerald_mv)}</span></div>
            <div class="panel-row"><span class="label">Ruby Total</span><span>${fmt(m.total_ruby_mv)}</span></div>
            <div class="panel-delta panel-row"><span class="label">Δ Emerald – Topaz</span>${deltaSpan(m.mv_delta)}</div>
            ${recordCounts(m.topaz_record_count, m.emerald_record_count, m.ruby_record_count)}`;
        } else if (m && m.topaz_mv !== undefined && m.emerald_mv !== undefined) {
          // Canonical account hub — all three MVs, delta, strategy, record counts
          const strategyRow = m.strategy_type
            ? `<div class="panel-row"><span class="label">Strategy</span><span>${m.strategy_type}</span></div>`
            : '';
          panel.innerHTML = `
            <div class="panel-title">${node.id}</div>
            ${strategyRow}
            <div class="panel-row"><span class="label">Topaz MV</span><span>${fmt(m.topaz_mv)}</span></div>
            <div class="panel-row"><span class="label">Emerald MV</span><span>${fmt(m.emerald_mv)}</span></div>
            <div class="panel-row"><span class="label">Ruby MV</span><span>${fmt(m.ruby_mv)}</span></div>
            <div class="panel-delta panel-row"><span class="label">Δ Emerald – Topaz</span>${deltaSpan(m.mv_delta)}</div>
            ${recordCounts(m.topaz_record_count, m.emerald_record_count, m.ruby_record_count)}`;
        } else if (m && m.mv !== undefined) {
          // Source spoke — system, MV, and record count with grain label
          const grain = m.system === 'Emerald' ? 'lots' : 'positions';
          const glRow = m.unrealized_gl !== null && m.unrealized_gl !== undefined
            ? `<div class="panel-row"><span class="label">Unrealized G/L</span><span>${fmt(m.unrealized_gl)}</span></div>`
            : `<div class="panel-row"><span class="label">Unrealized G/L</span><span style="color:#666">not reported</span></div>`;
          panel.innerHTML = `
            <div class="panel-title">${node.id}</div>
            <div class="panel-row"><span class="label">System</span><span>${m.system}</span></div>
            <div class="panel-row"><span class="label">Market Value</span><span>${fmt(m.mv)}</span></div>
            <div class="panel-row"><span class="label">Cost Basis</span><span>${fmt(m.cost_basis)}</span></div>
            ${glRow}
            <div class="panel-row"><span class="label">Records</span><span>${m.record_count} ${grain}</span></div>`;
        } else {
          panel.innerHTML = `<div class="panel-title">${node.id}</div>`;
        }
      })
      .onNodeDragEnd(node => {
        node.fx = node.x;
        node.fy = node.y;
        node.fz = node.z;
      })
      .onNodeClick(node => {
        // Scale zoom distance to viewport — desktop stays at 200, narrow mobile ~100
        const distance = Math.max(100, Math.min(200, window.innerWidth * 0.4));
        const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
        Graph.cameraPosition(
          { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
          node,
          3000
        );
      });

    loadGraphList();
  </script>
</body>
</html>
